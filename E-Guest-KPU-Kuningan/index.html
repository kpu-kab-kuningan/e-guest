<script>
    // ⚠️ PASTE URL WEB APP (/exec) YANG PESERTA DAPATKAN SETELAH DEPLOY DI SINI
    const URL_API_GOOGLE = "https://script.google.com/macros/s/AKfycbxwsovBlWk5vxTLUssCEp70YFV0Va5DXfgUEznz_pGNNTBtqmhgsAb8yykcMQDHSbD_ow/exec";

    let currentView = 'dashboard';
    let lineChartInstance = null;
    let pieChartInstance = null;
    let streamInstance = null;
    let rawDashboardData = null;

    // Menghilangkan Welcome Screen otomatis setelah 2.5 Detik
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const welcome = document.getElementById('welcomeScreen');
        welcome.classList.add('opacity-0', 'pointer-events-none');
        refreshData();
      }, 2500);
    });

    // Navigasi Router Antar Halaman
    function switchView(view) {
      currentView = view;
      document.getElementById('view-dashboard').classList.add('hidden');
      document.getElementById('view-tamu').classList.add('hidden');
      document.getElementById('btn-dashboard').className = "w-full flex items-center gap-4 px-4 py-3.5 rounded-xl text-slate-400 font-medium text-sm hover:bg-white/5 hover:text-white";
      document.getElementById('btn-tamu').className = "w-full flex items-center gap-4 px-4 py-3.5 rounded-xl text-slate-400 font-medium text-sm hover:bg-white/5 hover:text-white";

      if (view === 'dashboard') {
        document.getElementById('view-dashboard').classList.remove('hidden');
        document.getElementById('btn-dashboard').className = "w-full flex items-center gap-4 px-4 py-3.5 rounded-xl transition-all duration-200 font-medium text-sm bg-gradient-to-r from-amber-500 to-amber-600 text-indigo-950 shadow-md";
        document.getElementById('pageTitle').innerText = "Dashboard Visual";
      } else {
        document.getElementById('view-tamu').classList.remove('hidden');
        document.getElementById('btn-tamu').className = "w-full flex items-center gap-4 px-4 py-3.5 rounded-xl transition-all duration-200 font-medium text-sm bg-gradient-to-r from-amber-500 to-amber-600 text-indigo-950 shadow-md";
        document.getElementById('pageTitle').innerText = "Data Tamu Digital";
      }
    }

    // LOGIKA TOGGLE SIDEBAR ADAPTIF SCREEN SIZE
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const mainContent = document.getElementById('mainContent');
      const isDesktop = window.innerWidth >= 768;

      if (isDesktop) {
        if (mainContent.classList.contains('md:pl-72')) {
          sidebar.classList.remove('md:translate-x-0');
          sidebar.classList.add('-translate-x-full');
          mainContent.classList.remove('md:pl-72');
          mainContent.classList.add('md:pl-0');
        } else {
          sidebar.classList.remove('-translate-x-full');
          sidebar.classList.add('md:translate-x-0');
          mainContent.classList.remove('md:pl-0');
          mainContent.classList.add('md:pl-72');
        }
      } else {
        if (sidebar.classList.contains('-translate-x-full')) {
          sidebar.classList.remove('-translate-x-full');
          sidebar.classList.add('translate-x-0');
        } else {
          sidebar.classList.remove('translate-x-0');
          sidebar.classList.add('-translate-x-full');
        }
      }
    }

    // PERBAIKAN JALUR 2: Mengambil data Dashboard & Tabel via Fetch API
    function refreshData() {
      // 1. Ambil data analitik Dashboard
      fetch(URL_API_GOOGLE, {
        method: "POST",
        body: JSON.stringify({ action: "ambilDashboard" })
      })
      .then(res => res.json())
      .then(res => {
        if (res.success) {
          renderDashboard(res.data);
        } else {
          console.error("Gagal memuat dashboard:", res.message);
        }
      })
      .catch(err => console.error("Network Error (Dashboard):", err));

      // 2. Ambil data log list Tabel Tamu
      fetch(URL_API_GOOGLE, {
        method: "POST",
        body: JSON.stringify({ action: "ambilData" })
      })
      .then(res => res.json())
      .then(res => {
        if (res.success) {
          renderTable(res.data);
        } else {
          console.error("Gagal memuat tabel tamu:", res.message);
        }
      })
      .catch(err => console.error("Network Error (Tabel):", err));
    }

    function renderDashboard(res) {
      rawDashboardData = res;
      document.getElementById('kpi-hari').innerText = res.kpi.hari;
      document.getElementById('kpi-bulan').innerText = res.kpi.bulan;
      document.getElementById('kpi-tahun').innerText = res.kpi.tahun;

      // Render Line Chart (Tren Kunjungan)
      if (lineChartInstance) lineChartInstance.destroy();
      const ctxLine = document.getElementById('lineChart').getContext('2d');
      lineChartInstance = new Chart(ctxLine, {
        type: 'line',
        data: {
          labels: res.lineChart.labels,
          datasets: [{
            label: 'Jumlah Tamu',
            data: res.lineChart.values,
            borderColor: '#4f46e5',
            backgroundColor: 'rgba(79, 70, 229, 0.05)',
            fill: true,
            tension: 0.3,
            borderWidth: 3
          }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });

      // Render Pie Chart (Sebaran Sub Bagian)
      if (pieChartInstance) pieChartInstance.destroy();
      const ctxPie = document.getElementById('pieChart').getContext('2d');
      pieChartInstance = new Chart(ctxPie, {
        type: 'pie',
        data: {
          labels: res.pieChart.labels.map(l => l.length > 20 ? l.substring(0, 20) + '...' : l),
          datasets: [{
            data: res.pieChart.values,
            backgroundColor: ['#f59e0b', '#3b82f6', '#ec4899', '#10b981', '#8b5cf6', '#ef4444', '#6366f1']
          }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });
    }

    function renderTable(rows) {
      const tbody = document.getElementById('tamuTableBody');
      tbody.innerHTML = '';
      if(!rows || rows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center p-8 text-slate-400">Belum ada data tamu terekam.</td></tr>`;
        return;
      }
      rows.forEach(row => {
        let imgTag = row.foto !== '-' ? `<img src="${row.foto}" onclick="viewFullImage('${row.foto}')" class="w-10 h-10 object-cover rounded-full border border-slate-200 cursor-zoom-in hover:scale-105 transition-transform">` : `<div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-400"><i class="fa-solid fa-user text-xs"></i></div>`;
        tbody.innerHTML += `
          <tr class="hover:bg-slate-50/80 transition-colors">
            <td class="p-4 text-center font-medium text-slate-500">${row.no}</td>
            <td class="p-4">${imgTag}</td>
            <td class="p-4">
              <div class="font-bold text-slate-900">${row.nama}</div>
              <div class="text-slate-400 text-[11px]">${row.instansi} • WA: ${row.whatsapp}</div>
            </td>
            <td class="p-4">
              <span class="px-2.5 py-1 rounded-full text-[10px] font-semibold bg-indigo-50 text-indigo-600 block w-fit max-w-[200px] truncate" title="${row.tujuan}">${row.tujuan}</span>
              <div class="text-slate-500 mt-1 italic">"${row.keperluan}"</div>
            </td>
            <td class="p-4 text-slate-500">${row.timestamp}</td>
            <td class="p-4 text-center">
              <button onclick="hapusRow(${row.no})" class="p-2 text-red-500 hover:bg-red-50 rounded-xl transition-colors"><i class="fa-solid fa-trash-can"></i></button>
            </td>
          </tr>
        `;
      });
    }

    // Modal KPI Drilldown Klik
    function openBreakdown(type) {
      if (!rawDashboardData) return;
      const title = document.getElementById('breakdownTitle');
      const content = document.getElementById('breakdownContent');
      content.innerHTML = '';
      
      if(type === 'bulan') {
        title.innerText = "Kunjungan Per Bulan (Tahun Ini)";
        const namaBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        rawDashboardData.breakdownBulan.forEach((val, idx) => {
          content.innerHTML += `<div class="flex justify-between p-2.5 bg-slate-50 rounded-xl"><strong>${namaBulan[idx]}</strong> <span class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-md font-bold">${val} Tamu</span></div>`;
        });
      } else {
        title.innerText = "Kunjungan Per Tahun";
        const labels = rawDashboardData.breakdownTahun.labels;
        const values = rawDashboardData.breakdownTahun.values;
        if(!labels || labels.length === 0) content.innerHTML = '<p class="text-slate-400">Belum tersedia data.</p>';
        labels.forEach((thn, idx) => {
          content.innerHTML += `<div class="flex justify-between p-2.5 bg-slate-50 rounded-xl"><strong>Tahun ${thn}</strong> <span class="bg-amber-100 text-amber-700 px-2 py-0.5 rounded-md font-bold">${values[idx]} Tamu</span></div>`;
        });
      }
      document.getElementById('modalBreakdown').classList.remove('hidden');
    }

    function closeBreakdown() { document.getElementById('modalBreakdown').classList.add('hidden'); }

    function openModalForm() {
      document.getElementById('modalForm').classList.remove('hidden');
      const video = document.getElementById('video');

      navigator.mediaDevices.getUserMedia({ 
        video: true, 
        audio: false 
      })
      .then(stream => {
        streamInstance = stream;
        video.srcObject = stream;
        
        video.onloadedmetadata = () => {
          video.play()
            .then(() => console.log("Kamera berhasil dirender."))
            .catch(err => console.error("Gagal play:", err));
        };
      })
      .catch(err => {
        console.error("Detail Error Kamera:", err);
        Swal.fire('Gagal Memuat Kamera', `Penyebab: ${err.name}. Coba cek webcam Anda.`, 'error');
      });
    }

    function closeModalForm() {
      document.getElementById('modalForm').classList.add('hidden');
      if (streamInstance) {
        streamInstance.getTracks().forEach(track => track.stop());
      }
      retakePhoto();
    }

    function captureSnapshot() {
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const capturedImage = document.getElementById('capturedImage');
      
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      
      const dataUrl = canvas.toDataURL('image/jpeg');
      capturedImage.src = dataUrl;
      
      video.classList.add('hidden');
      capturedImage.classList.remove('hidden');
    }

    function retakePhoto() {
      document.getElementById('video').classList.remove('hidden');
      document.getElementById('capturedImage').classList.add('hidden');
      document.getElementById('capturedImage').removeAttribute('src');
    }

    // PERBAIKAN JALUR 2: Mengirim formulir tamu baru menggunakan Fetch API POST
    function submitGuestForm(e) {
      e.preventDefault();
      const form = document.getElementById('guestForm');
      const formData = {
        nama: form.nama.value,
        instansi: form.instansi.value,
        whatsapp: form.whatsapp.value,
        tujuan: form.tujuan.value,
        keperluan: form.keperluan.value
      };
      
      const fotoBase64 = document.getElementById('capturedImage').src;
      // Validasi apakah foto sudah diambil atau masih kosong/berisi URL domain
      if (!fotoBase64 || fotoBase64.startsWith('http')) {
        Swal.fire('Foto Wajib', 'Mohon ambil foto tamu terlebih dahulu untuk laporan verifikasi.', 'warning');
        return;
      }

      Swal.fire({ title: 'Menyimpan Data...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

      // Menembak REST API Google Apps Script
      fetch(URL_API_GOOGLE, {
        method: "POST",
        body: JSON.stringify({
          action: "simpan",
          data: formData,
          base64Image: fotoBase64
        })
      })
      .then(res => res.json())
      .then(res => {
        Swal.close();
        if(res.success) {
          Swal.fire('Berhasil!', 'Selamat Datang di KPU Kabupaten Kuningan.', 'success');
          form.reset();
          closeModalForm();
          refreshData();
        } else {
          Swal.fire('Gagal', res.message, 'error');
        }
      })
      .catch(err => {
        Swal.close();
        Swal.fire('Gagal', 'Terjadi kesalahan sistem/jaringan: ' + err, 'error');
      });
    }

    function viewFullImage(url) {
      Swal.fire({ imageUrl: url, imageAlt: 'Foto Tamu Lengkap', showCloseButton: true, showConfirmButton: false });
    }

    // PERBAIKAN JALUR 2: Menghapus baris log tamu menggunakan Fetch API POST
    function hapusRow(no) {
      Swal.fire({ 
        title: 'Hapus Data?', 
        text: "Data tamu nomor " + no + " akan dihapus selamanya.", 
        icon: 'warning', 
        showCancelButton: true, 
        confirmButtonColor: '#ef4444', 
        confirmButtonText: 'Ya, Hapus' 
      }).then((result) => {
        if (result.isConfirmed) {
          Swal.fire({ title: 'Menghapus...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

          fetch(URL_API_GOOGLE, {
            method: "POST",
            body: JSON.stringify({
              action: "hapus",
              data: { no: no }
            })
          })
          .then(res => res.json())
          .then(res => {
            Swal.close();
            if(res.success) {
              Swal.fire('Terhapus', 'Data berhasil dibersihkan.', 'success');
              refreshData();
            } else {
              Swal.fire('Gagal', res.message, 'error');
            }
          })
          .catch(err => {
            Swal.close();
            Swal.fire('Gagal', 'Gagal terhubung dengan server: ' + err, 'error');
          });
        }
      });
    }

    function searchTable() {
      const input = document.getElementById("tableSearch").value.toUpperCase();
      const rows = document.getElementById("tamuTableBody").getElementsByTagName("tr");
      for (let i = 0; i < rows.length; i++) {
        let match = false;
        let cells = rows[i].getElementsByTagName("td");
        if(cells.length > 2) {
          if (cells[2].innerText.toUpperCase().indexOf(input) > -1) match = true;
          rows[i].style.display = match ? "" : "none";
        }
      }
    }
  </script>
